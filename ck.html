<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Số Biến Thiên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        input, select {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px;
            width: 100%;
            font-size: 16px; 
        }
        .val-pos { color: #10b981; } 
        .val-neg { color: #ef4444; } 
        .val-neutral { color: #6b7280; } 
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .tab-active {
            border-bottom: 3px solid #374151;
            color: #111827;
            font-weight: 800;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <!-- Tabs -->
        <div class="flex mb-4 bg-white rounded-xl shadow-sm overflow-hidden">
            <button id="tabCS" onclick="switchTab('CS')" class="flex-1 py-3 text-sm font-bold text-gray-400 transition-all tab-active">LOẠI 1</button>
            <button id="tabPS" onclick="switchTab('PS')" class="flex-1 py-3 text-sm font-bold text-gray-400 transition-all">LOẠI 2</button>
        </div>

        <!-- Vùng hiển thị vốn thực tế -->
        <div class="card p-4 mb-4 bg-gradient-to-br from-gray-700 to-gray-800 text-white shadow-lg text-center">
            <div id="displayTotal" class="text-2xl font-black">0</div>
        </div>

        <!-- Section nhập liệu -->
        <div class="card p-4 mb-4">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Giá trị gốc</label>
                    <input type="number" id="inputA" value="30.00" step="0.05" oninput="saveAndCalculate()">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Định mức</label>
                    <input type="number" id="inputB" value="1000" step="100" oninput="saveAndCalculate()">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Độ lệch</label>
                    <input type="number" id="inputC" value="0.05" step="0.05" oninput="saveAndCalculate()">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Giới hạn</label>
                    <input type="number" id="inputD" value="10" step="1" oninput="saveAndCalculate()">
                </div>
            </div>

            <div>
                <select id="inputE" onchange="saveAndCalculate()">
                    <option value="up">Tăng</option>
                    <option value="down">Giảm</option>
                </select>
            </div>
        </div>

        <!-- Bảng hiển thị kết quả -->
        <div id="outputArea" class="result-grid"></div>
    </div>

    <script>
        const fields = ['inputA', 'inputB', 'inputC', 'inputD', 'inputE'];
        let currentTab = 'CS';

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabCS').classList.toggle('tab-active', tab === 'CS');
            document.getElementById('tabPS').classList.toggle('tab-active', tab === 'PS');

            if (tab === 'CS') {
                document.getElementById('inputA').value = "30.00";
                document.getElementById('inputA').step = "0.05";
                document.getElementById('inputB').value = "1000";
                document.getElementById('inputC').value = "0.05";
                document.getElementById('inputC').step = "0.05";
            } else {
                document.getElementById('inputA').value = "1840.0";
                document.getElementById('inputA').step = "0.1";
                document.getElementById('inputB').value = "3";
                document.getElementById('inputC').value = "1.0";
                document.getElementById('inputC').step = "0.1";
            }
            
            loadData();
            calculate();
        }

        function saveAndCalculate() {
            const data = {};
            fields.forEach(id => {
                data[id] = document.getElementById(id).value;
            });
            localStorage.setItem(`data_${currentTab}`, JSON.stringify(data));
            calculate();
        }

        function loadData() {
            const savedData = localStorage.getItem(`data_${currentTab}`);
            if (savedData) {
                const data = JSON.parse(savedData);
                fields.forEach(id => {
                    if (data[id] !== undefined) {
                        document.getElementById(id).value = data[id];
                    }
                });
            }
        }

        function calculate() {
            const valA = parseFloat(document.getElementById('inputA').value) || 0;
            const valB = parseInt(document.getElementById('inputB').value) || 0;
            const valC = parseFloat(document.getElementById('inputC').value) || 0.05;
            const valD = parseInt(document.getElementById('inputD').value) || 10;
            const valE = document.getElementById('inputE').value;

            const outputArea = document.getElementById('outputArea');
            const displayTotal = document.getElementById('displayTotal');
            outputArea.innerHTML = '';

            let realCapital = 0; // Vốn thực tế để hiển thị ở ô trên cùng

            if (currentTab === 'CS') {
                // Cơ sở: Vốn = Giá mua * SL * (1 + phí 0.03%)
                realCapital = (valA * 1000) * valB * (1 + 0.0003);
            } else {
                // Phái sinh: Vốn thực tế = 121tr cho 3 HĐ -> 40,333,333đ mỗi hợp đồng
                const marginPerContract = 121000000 / 3; 
                realCapital = valB * marginPerContract;
            }
            
            displayTotal.innerText = format(Math.round(realCapital));

            for (let i = 1; i <= valD; i++) {
                let shift = (valE === 'up' ? i * valC : -(i * valC));
                let finalVal = valA + shift;
                if (finalVal <= 0) break;

                let resultNet = 0;
                let resultPct = 0;

                if (currentTab === 'CS') {
                    const totalSell = (finalVal * 1000) * valB * (1 - 0.0013);
                    resultNet = totalSell - realCapital;
                    resultPct = (resultNet / (valA * 1000 * valB)) * 100;
                } else {
                    // Phái sinh: Chênh lệch điểm * 100,000 * số hợp đồng
                    const pointDiff = finalVal - valA;
                    const totalProfitBeforeFee = pointDiff * 100000 * valB;
                    const totalFees = valB * 40000; // Phí trọn gói 0.4 điểm
                    
                    resultNet = totalProfitBeforeFee - totalFees;
                    
                    // Tính % trên số vốn thực tế hiển thị ở trên
                    resultPct = (resultNet / realCapital) * 100;
                }

                const item = document.createElement('div');
                item.className = 'card p-3 flex justify-between items-center border-l-4 ' + 
                                (resultNet > 0 ? 'border-emerald-500' : 'border-red-500');
                
                let color = resultNet > 0 ? 'val-pos' : (resultNet < 0 ? 'val-neg' : 'val-neutral');
                let sign = resultNet > 0 ? '+' : '';
                let shiftSign = shift > 0 ? '+' : '';

                item.innerHTML = `
                    <div class="flex flex-col pr-1">
                        <span class="text-base font-black text-gray-800 leading-tight">${finalVal.toFixed(currentTab === 'CS' ? 2 : 1)}</span>
                        <span class="text-[10px] font-bold ${color}">${shiftSign}${shift.toFixed(currentTab === 'CS' ? 2 : 1)}</span>
                    </div>
                    <div class="text-right">
                        <div class="text-[13px] font-black ${color} leading-tight">${sign}${format(Math.round(resultNet))}</div>
                        <div class="text-[11px] font-bold ${color}">${sign}${resultPct.toFixed(2)}%</div>
                    </div>
                `;
                outputArea.appendChild(item);
            }
        }

        function format(n) {
            return n.toString().replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1,');
        }

        window.onload = function() {
            switchTab('CS');
        };
    </script>
</body>
</html>
