<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Học Toán Vui Nhộn</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #FF6B6B;
            --success: #4CAF50;
            --bg: #F0F7FF;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Lexend', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: #333;
        }

        .game-container {
            background-color: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(74, 144, 226, 0.2);
            padding: 40px;
            width: 80%; /* Chiều ngang 80% theo yêu cầu */
            max-width: 1200px; /* Giới hạn tối đa để không quá loãng trên màn hình cực lớn */
            min-width: 350px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border: 6px solid #E1EFFF;
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--primary);
            margin: 0;
            font-size: 2.2em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            background: #F8FBFF;
            padding: 20px;
            border-radius: 20px;
            border: 3px dashed #D0E4FF;
        }

        .score-item {
            font-size: 1.4em;
            font-weight: 700;
        }

        .score-correct { color: var(--success); }
        .score-incorrect { color: var(--secondary); }

        .question-box {
            background: #FFF;
            border-radius: 25px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            border: 1px solid #F0F0F0;
        }

        .math-vertical {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 5rem; /* Tăng kích thước số */
            font-weight: 700;
            color: #2D3436;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }

        .math-row {
            display: flex;
            justify-content: flex-end;
            min-width: 180px;
        }

        .math-op-row {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: flex-end;
        }

        .operator {
            position: absolute;
            left: -60px;
            color: var(--secondary);
        }

        .math-line {
            width: 100%;
            height: 6px;
            background: #2D3436;
            margin: 15px 0;
            border-radius: 3px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .answer-inputs {
            display: flex;
            justify-content: flex-end;
            width: 180px; /* Khớp với độ rộng math-row mới */
            gap: 10px;
        }

        .digit-input {
            width: 80px;
            height: 100px;
            border: 4px solid #E0E0E0;
            border-radius: 15px;
            font-size: 3.5rem;
            text-align: center;
            font-family: inherit;
            font-weight: 700;
            color: var(--primary);
            transition: all 0.2s;
        }

        .digit-input:focus {
            outline: none;
            border-color: var(--primary);
            background: #F0F7FF;
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-transform: uppercase;
        }

        .btn-check {
            background: var(--primary);
            color: white;
            box-shadow: 0 6px 0 #357ABD;
        }

        .btn-check:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #357ABD; }
        .btn-check:active { transform: translateY(3px); box-shadow: 0 0 0 #357ABD; }

        .btn-next {
            background: var(--success);
            color: white;
            box-shadow: 0 6px 0 #388E3C;
        }

        #feedback {
            height: 40px;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .road-section {
            width: 100%;
            background: #E1EFFF;
            padding: 20px;
            border-radius: 25px;
            box-sizing: border-box;
        }

        #roadCanvas {
            width: 100%;
            height: 120px;
            background: #444;
            border-radius: 15px;
            display: block;
        }

        .popup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .popup-card {
            background: white;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            .game-container { width: 95%; padding: 20px; }
            .math-vertical { font-size: 3.5rem; }
            .digit-input { width: 60px; height: 80px; font-size: 2.5rem; }
            .math-row, .answer-inputs { min-width: 130px; width: 130px; }
            .operator { left: -35px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Thử Thách Toán Học</h1>

        <div class="score-board">
            <div class="score-item score-correct">Đúng: <span id="correctVal">0</span>/30</div>
            <div class="score-item score-incorrect">Sai: <span id="incorrectVal">0</span></div>
        </div>

        <div class="question-box">
            <div id="mathDisplay" class="math-vertical">
                <!-- Phép tính render ở đây -->
            </div>
        </div>

        <div class="input-wrapper">
            <div class="answer-inputs">
                <input type="text" id="tens" class="digit-input" maxlength="1" inputmode="numeric">
                <input type="text" id="units" class="digit-input" maxlength="1" inputmode="numeric">
            </div>
            <div id="feedback"></div>
            <div class="controls">
                <button id="btnSubmit" class="btn btn-check">KIỂM TRA</button>
                <button id="btnNext" class="btn btn-next" style="display: none;">TIẾP TỤC ➔</button>
            </div>
        </div>

        <div class="road-section">
            <canvas id="roadCanvas"></canvas>
        </div>
    </div>

    <div id="winPopup" class="popup">
        <div class="popup-card">
            <h2 style="font-size: 3rem; margin: 0; color: var(--primary);">🎉 TUYỆT VỜI!</h2>
            <p style="font-size: 1.5rem; color: #666; margin: 25px 0;">Bạn đã hoàn thành chặng đường xuất sắc!</p>
            <button onclick="location.reload()" class="btn btn-check" style="width: 100%">CHƠI LẠI</button>
        </div>
    </div>

    <script>
        const mathDisplay = document.getElementById('mathDisplay');
        const tensInp = document.getElementById('tens');
        const unitsInp = document.getElementById('units');
        const feedback = document.getElementById('feedback');
        const correctText = document.getElementById('correctVal');
        const incorrectText = document.getElementById('incorrectVal');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnNext = document.getElementById('btnNext');
        const roadCanvas = document.getElementById('roadCanvas');
        const ctx = roadCanvas.getContext('2d');

        let state = {
            correct: 0,
            incorrect: 0,
            target: 30,
            currentAns: 0
        };

        function getRandom(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateQuestion() {
            const types = ['add_carry', 'sub_borrow', 'add_simple', 'sub_simple', 'mul2', 'mul5', 'div2', 'div5'];
            const type = types[getRandom(0, types.length - 1)];
            let n1, n2, op, ans;

            switch(type) {
                case 'add_carry':
                    n1 = getRandom(11, 79); 
                    n2 = getRandom(11, 89 - n1);
                    while((n1%10) + (n2%10) < 10) { n2 = getRandom(11, 89-n1); }
                    op = '+'; ans = n1 + n2; break;
                case 'sub_borrow':
                    n1 = getRandom(21, 98);
                    n2 = getRandom(11, n1 - 1);
                    while((n1%10) >= (n2%10)) { n2 = getRandom(11, n1-1); }
                    op = '-'; ans = n1 - n2; break;
                case 'mul2':
                    n1 = 2; n2 = getRandom(1, 9); op = '×'; ans = n1 * n2; break;
                case 'mul5':
                    n1 = 5; n2 = getRandom(1, 9); op = '×'; ans = n1 * n2; break;
                case 'div2':
                    ans = getRandom(1, 9); n2 = 2; n1 = ans * n2; op = '÷'; break;
                case 'div5':
                    ans = getRandom(1, 9); n2 = 5; n1 = ans * n2; op = '÷'; break;
                case 'add_simple':
                    n1 = getRandom(11, 70); n2 = getRandom(11, 20);
                    while((n1%10) + (n2%10) >= 10) { n2 = getRandom(11, 20); }
                    op = '+'; ans = n1 + n2; break;
                default: // sub_simple
                    n1 = getRandom(21, 99); n2 = getRandom(11, 20);
                    while((n1%10) < (n2%10)) { n2 = getRandom(11, 20); }
                    op = '-'; ans = n1 - n2;
            }

            state.currentAns = ans;
            renderQuestion(n1, n2, op);
        }

        function renderQuestion(n1, n2, op) {
            const s1 = n1.toString();
            const s2 = n2.toString();
            
            mathDisplay.innerHTML = `
                <div class="math-row">${s1}</div>
                <div class="math-op-row">
                    <span class="operator">${op}</span>
                    <span>${s2}</span>
                </div>
                <div class="math-line"></div>
            `;
            
            tensInp.value = '';
            unitsInp.value = '';
            tensInp.disabled = false;
            unitsInp.disabled = false;
            tensInp.focus();
            feedback.textContent = '';
            btnSubmit.style.display = 'block';
            btnNext.style.display = 'none';
        }

        function check() {
            const val = (tensInp.value || "0") + (unitsInp.value || "0");
            const userAns = parseInt(val);

            if (userAns === state.currentAns) {
                state.correct++;
                feedback.innerHTML = '<span style="color: var(--success)">Chính xác! ✨</span>';
                if (state.correct >= state.target) {
                    document.getElementById('winPopup').style.display = 'flex';
                }
            } else {
                state.incorrect++;
                feedback.innerHTML = `<span style="color: var(--secondary)">Sai rồi! Đáp án là ${state.currentAns}</span>`;
            }

            correctText.textContent = state.correct;
            incorrectText.textContent = state.incorrect;
            
            tensInp.disabled = true;
            unitsInp.disabled = true;
            btnSubmit.style.display = 'none';
            btnNext.style.display = 'block';
            drawRoad();
        }

        function drawRoad() {
            const w = roadCanvas.width = roadCanvas.offsetWidth;
            const h = roadCanvas.height = 120;
            
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, w, h);
            
            ctx.strokeStyle = "#FFF";
            ctx.setLineDash([20, 20]);
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
            ctx.stroke();

            const padding = 60;
            const usableW = w - (padding * 2);
            for(let i=0; i<=state.target; i+=5) {
                const x = padding + (i / state.target) * usableW;
                ctx.fillStyle = i === state.target ? "#FFD700" : "#FFF";
                ctx.beginPath();
                ctx.arc(x, h/2, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#CCC";
                ctx.font = "bold 14px Lexend";
                ctx.textAlign = "center";
                ctx.fillText(i === 0 ? "BẮT ĐẦU" : i, x, h - 15);
            }

            const playerX = padding + (state.correct / state.target) * usableW;
            ctx.font = "45px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🏎️", playerX, h/2 - 5);
        }

        tensInp.addEventListener('input', (e) => {
            if (e.target.value.length >= 1) unitsInp.focus();
        });

        btnSubmit.onclick = check;
        btnNext.onclick = generateQuestion;
        
        window.onkeydown = (e) => {
            if (e.key === 'Enter') {
                if (btnSubmit.style.display !== 'none') check();
                else if (btnNext.style.display !== 'none') generateQuestion();
            }
        };

        window.onload = () => {
            generateQuestion();
            drawRoad();
            window.onresize = drawRoad;
        };
    </script>
</body>
</html>
